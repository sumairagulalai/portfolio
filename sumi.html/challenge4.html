<script>

// / challenge 4 
// question#  Steven wants to build a very simple tip calculator for whenever he goes eating in a 
// restaurant. In his country, it's usual to tip 15% if the bill value is between 50 and 
// 300. If the value is different, the tip is 20%. 
// Your tasks: 
// 1. Calculate the tip, depending on the bill value. Create a variable called 'tip' for 
// this. It's not allowed to use an if/else statement 
// �
// � (If it's easier for you, you can 
// start with an if/else statement, and then try to convert it to a ternary 
// operator!) 
// 2. Print a string to the console containing the bill value, the tip, and the final value 
// (bill + tip). Example: “The bill was 275, the tip was 41.25, and the total value 
// 316.25” 
// Test data: 
// § Data 1: Test for bill values 275, 40 and 430 
// Hints: 
// § To calculate 20% of a value, simply multiply it by 20/100 = 0.2 
// § Value X is between 50 and 300, if it's >= 50 && <= 300

// coding .....



let bill = 275;

//  we will use ternary 
let tip = (bill >= 50 && bill <= 300) ? bill * 0.15 : bill * 0.2;

let total = bill + tip;

console.log(`The bill was ${bill}, the tip was ${tip}, and the total value ${total}`);

// try secound value 
let bill2 = 40;
let tip2 = (bill2>=50 && bill2<=300) ? bill2 * 0.15 : bill2*0.20;
let total2 = bill2 + tip2
console.log(`the bill2 was ${bill2}, the tip2 was ${tip2} and the total value ${total2}`);
// value 3 
let bill3 = 430;

let total3 = bill3 + tip3;
console.log(`the bill3 was ${bill3}, and the tip3 was ${tip3}, and the total3 was ${total3} `)
