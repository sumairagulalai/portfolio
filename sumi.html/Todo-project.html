<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        font-family: 'poppins','sans-seraf';
        box-sizing: border-box;
    }
    .container{
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg,#d4860a,#4e085f);
        padding: 10px;
    }
    .todo-app{
        width: 100%;
        max-width: 540px;
        background: #fff;
        margin: 100px auto 20px;
        padding: 40px 30px 70px;
        border-radius: 10px;
    }
    .todo-app h1{
        font-size: 40px;
        color: #006543;
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }
    /* todo-app h1 img{
        position: absolute;
        top: 50px;
    } */
    .row{
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #7fead1;
        border-radius: 30px;
        padding-left: 20px;
        margin-bottom: 25px;
    }
    .row input{
         height: 30px;
         flex: 1;
         border: none;
         outline: none;
         background: transparent;
         padding: 10px;
    }
    button{
        width: 10px;
        height: 50px;
        border: none;
        outline: none;
        padding: 10px 60px;
        background: #ff5945;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        border-radius: 40px;
    }
    ul li{
        list-style: none;
        font-size: 17px;
        padding: 8px 12px 8px 50px;
        user-select: none;
        cursor: pointer;
        position: relative;
    }
     ul li::before{
        content: '';
        position: absolute;
        height: 15px;
        width: 28px;
        border-radius: 50%;
        background-image: url("c:/Users/sumai/Downloads/unchecked.png");
        background-size: cover;
        background-position: center;
        top: 12px;
        left: 8px;
     }
     ul li.checked{
        color: #555;
        text-decoration: line-through;
     }
     ul li.checked::before{
        background-image: url("c:/Users/sumai/Downloads/checked.png");
     }
     ul li span{
        position: absolute;
        right: 0;
        top: 5px;
        width: 50px;
        height: 40px;
        font-size: 22px;
        color: #555;
        line-height: 40px;
        text-align: center;
     }
     ul li span:hover{
        background: #a8a7a7;
        border-radius: 50%;
     }
</style>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>To-do list <img src="c:\Users\sumai\Downloads\todoo.png" alt="" width="90px " style="position: relative; bottom: 40px; left: 250px;"></h1>
            <div class="row">
                <input type="text" name="" id="input-box" placeholder="add your information" >
                <button onclick="addtask()">Add➕</button>

            </div>
            <ul id="list-container">
                <!-- <li class="checked">Task 1</li>
                <li>Task 2</li>
                <li>Task 3</li>
                <li>Task 4</li> -->
            </ul>
        </div>
    </div>
</body>
<script>
const inputbox = document.getElementById("input-box")
const listcontainer = document.getElementById("list-container")
function addtask(){
    if(inputbox.value==''){
        alert("You must write someting")
    }
    else{
        let li = document.createElement("li")
        li.innerHTML=inputbox.value;
        listcontainer.appendChild(li)
        let span = document.createElement("span")
        span.innerHTML="\u00d7"
        li.appendChild(span)
    }
    inputbox.value="";
    savedata();
}
listcontainer.addEventListener("click", function(e){
    if(e.target.tagName === "LI"){
        e.target.classList.toggle("checked");
        savedata();
    }
    else if(e.target.tagName === "SPAN"){
        e.target.parentElement.remove();
        savedata();
    }
}, false);

function savedata(){
    localStorage.setItem("data",listcontainer.innerHTML)
}
function showtask(){
    listcontainer.innerHTML=localStorage.getItem("data")
}
showtask()
</script>
</html>
