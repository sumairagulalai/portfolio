# Eid Mubarak Cartoon Intro + Heart Animation

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Surprise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:black;
}

/* FIRST SCREEN */

.intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff0066,#ff4d88,#ff99bb);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.cartoon{
    font-size:130px;
    animation:bounce 1.5s infinite;
    filter:drop-shadow(0 0 20px white);
}

.message{
    margin-top:20px;
    color:white;
    font-size:35px;
    font-weight:bold;
    text-align:center;
    text-shadow:
        0 0 10px white,
        0 0 20px red;

    animation:blink 1s infinite alternate;
}

.open-btn{
    margin-top:35px;
    padding:18px 45px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff0066;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;

    box-shadow:
        0 0 15px white,
        0 0 30px pink;
}

.open-btn:hover{
    transform:scale(1.1);
}

/* SECOND SCREEN */

.main-page{
    display:none;
    width:100%;
    height:100vh;
    position:relative;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
}

/* Moving LOVE Background */

.love-bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.love{
    position:absolute;
    color:#ff004c;
    font-size:20px;
    font-weight:bold;
    opacity:0.8;
    animation:moveLove linear infinite;

    text-shadow:
        0 0 10px #ff0055,
        0 0 20px #ff0055,
        0 0 40px red;
}

/* Heart */

.heart-container{
    position:relative;
    width:420px;
    height:420px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5;
}

.heart{
    position:relative;
    width:220px;
    height:220px;
    background:#ff0055;
    transform:rotate(-45deg);
    animation:heartbeat 1.2s infinite;

    box-shadow:
        0 0 20px #ff0055,
        0 0 50px #ff0055,
        0 0 90px rgba(255,0,85,0.8);
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:#ff0055;
    border-radius:50%;
}

.heart::before{
    top:-110px;
    left:0;
}

.heart::after{
    left:110px;
    top:0;
}

/* Text */

.center-text{
    position:absolute;
    top:42%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    font-size:30px;
    font-weight:bold;
    z-index:10;
    line-height:1.5;

    text-shadow:
        0 0 10px white,
        0 0 20px #ff4d88,
        0 0 40px red;
}

/* Floating Hearts */

.floating-heart{
    position:absolute;
    color:#ff4d88;
    opacity:0;
    animation:rise linear forwards;
}

/* Animations */

@keyframes bounce{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }
}

@keyframes blink{

    from{
        opacity:0.7;
    }

    to{
        opacity:1;
    }
}

@keyframes heartbeat{

    0%{
        transform:rotate(-45deg) scale(1);
    }

    25%{
        transform:rotate(-45deg) scale(1.08);
    }

    50%{
        transform:rotate(-45deg) scale(1);
    }

    75%{
        transform:rotate(-45deg) scale(1.08);
    }

    100%{
        transform:rotate(-45deg) scale(1);
    }
}

@keyframes moveLove{

    0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

@keyframes rise{

    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- FIRST PAGE -->

<div class="intro" id="introPage">

    <div class="cartoon"><img src="c:\Users\sumai\Downloads\mee.png.jpeg" alt="" width="150px" height="250px">👉👈</div>

    <div class="message">
        Jaldi Se Button Click Karo ❤️
    </div>

    <button class="open-btn" onclick="openSurprise()">
        Click Here ✨
    </button>

</div>

<!-- SECOND PAGE -->

<div class="main-page" id="mainPage">

    <div class="love-bg" id="loveBg"></div>

    <div class="heart-container">

        <div class="heart"></div>

        <div class="center-text">
            Eid Mubarak ❤️<br>
            To My Shehzada
        </div>

    </div>

</div>

<script>

/* Open Surprise */

function openSurprise(){

    document.getElementById("introPage").style.display="none";

    document.getElementById("mainPage").style.display="flex";
}

/* Moving LOVE Background */

const loveBg = document.getElementById("loveBg");

function createLove(){

    const love = document.createElement("div");

    love.classList.add("love");

    love.innerHTML = "LOVE ❤️";

    love.style.left = Math.random()*100 + "vw";

    love.style.fontSize = (Math.random()*20 + 15) + "px";

    love.style.animationDuration = (Math.random()*5 + 5) + "s";

    loveBg.appendChild(love);

    setTimeout(()=>{
        love.remove();
    },10000);
}

setInterval(createLove,120);

/* Floating Hearts */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("floating-heart");

    heart.innerHTML = "❤";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize = (Math.random()*20 + 15) + "px";

    heart.style.animationDuration = (Math.random()*3 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
```
