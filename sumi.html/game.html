<!DOCTYPE html>
<html>
<head>
    <title>Toss Game</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #9face6);
            margin-top: 100px;
        }

        .box{
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 15px gray;
        }

        h1{
            color: #333;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            background: #6c5ce7;
            color: white;
        }

        button:hover{
            background: #4834d4;
        }

        #result{
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        #score{
            margin-top: 15px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎲 Toss Game</h1>

    <button onclick="play('Heads')">Heads</button>
    <button onclick="play('Tails')">Tails</button>

    <div id="result"></div>
    <div id="score">Wins: 0 | Loss: 0</div>
</div>

<script>
let win = 0;
let loss = 0;

function play(userChoice){
    let toss = Math.random() < 0.5 ? "Heads" : "Tails";

    if(userChoice === toss){
        document.getElementById("result").innerText = "🎉 You Win! (" + toss + ")";
        win++;
    } else {
        document.getElementById("result").innerText = "😢 You Lose! (" + toss + ")";
        loss++;
    }

    document.getElementById("score").innerText = "Wins: " + win + " | Loss: " + loss;
}
</script>

</body>
</html>
